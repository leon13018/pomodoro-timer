<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>axi-front-design 展示页</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #171717;
      --muted: #646464;
      --paper: #f7f3ea;
      --line: #d9d0c3;
      --accent: #1e6f5c;
      --accent-2: #c7472c;
      --panel: #fffaf1;
      --shadow: 0 24px 80px rgba(39, 32, 23, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(90deg, rgba(23, 23, 23, 0.035) 1px, transparent 1px) 0 0 / 72px 72px,
        linear-gradient(180deg, rgba(23, 23, 23, 0.035) 1px, transparent 1px) 0 0 / 72px 72px,
        var(--paper);
      color: var(--ink);
      font-family: ui-serif, Georgia, "Times New Roman", "Noto Serif SC", serif;
    }

    main {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 56px 0 64px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 0.82fr) minmax(360px, 1.18fr);
      gap: 48px;
      align-items: center;
      min-height: calc(100vh - 120px);
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 28px;
      color: var(--accent);
      font: 700 13px/1.1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 42px;
      height: 2px;
      background: var(--accent);
    }

    h1 {
      max-width: 620px;
      margin: 0;
      font-size: clamp(52px, 7vw, 112px);
      line-height: 0.96;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .copy {
      max-width: 560px;
      margin: 28px 0 0;
      color: var(--muted);
      font: 20px/1.72 "Songti SC", "Noto Serif SC", serif;
      text-wrap: pretty;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid var(--ink);
      color: var(--ink);
      text-decoration: none;
      font: 700 14px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .button.primary {
      background: var(--ink);
      color: var(--panel);
    }

    .motion {
      position: relative;
      margin: 0;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .motion::before {
      content: "Product Motion Demo";
      position: absolute;
      top: -16px;
      left: 24px;
      padding: 6px 10px;
      background: var(--accent-2);
      color: #fffaf1;
      font: 700 12px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    video {
      display: block;
      width: 100%;
      max-height: 76vh;
      background: #111;
      object-fit: contain;
    }

    .caption {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 14px;
      color: var(--muted);
      font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .rule {
      flex: 1;
      align-self: center;
      height: 1px;
      background: var(--line);
    }

    @media (max-width: 860px) {
      main {
        width: min(100% - 28px, 680px);
        padding-top: 34px;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 40px;
        min-height: auto;
      }

      h1 {
        font-size: clamp(46px, 15vw, 74px);
      }

      .copy {
        font-size: 18px;
      }

      .motion {
        padding: 10px;
      }

      .caption {
        flex-direction: column;
        gap: 8px;
      }

      .rule {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero" aria-label="axi-front-design 产品展示">
      <div>
        <p class="eyebrow">axi-front-design</p>
        <h1>让 HTML 直接长成高保真设计稿</h1>
        <p class="copy">
          面向落地页、幻灯片、交互原型与产品动效的 Claude Code Skill。
          它先追问设计上下文，再把真实品牌约束、版式节奏和可迭代变体落到可打开的 HTML 里。
        </p>
        <div class="actions">
          <a class="button primary" href="../SKILL.md">查看 Skill</a>
          <a class="button" href="../README.md">返回 README</a>
        </div>
      </div>

      <figure class="motion">
        <video src="assets/axi-front-design-motion.mp4" controls autoplay muted loop playsinline preload="metadata"></video>
        <figcaption class="caption">
          <span>产品宣传动效展示</span>
          <span class="rule" aria-hidden="true"></span>
          <span>HTML / Prototype / Motion</span>
        </figcaption>
      </figure>
    </section>
  </main>
</body>
</html>
